<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="system-ui, sans-serif">
  <!-- 背景 -->
  <rect width="900" height="320" fill="#f8fafc" rx="8"/>
  
  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">云原生技术发展时间线</text>
  
  <!-- 主时间线 -->
  <line x1="50" y1="160" x2="860" y2="160" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 节点和标签 -->
  <!-- 2004 Borg -->
  <circle cx="80" cy="160" r="6" fill="#6366f1"/>
  <text x="80" y="140" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="bold">2004</text>
  <text x="80" y="190" text-anchor="middle" font-size="9" fill="#475569">Google Borg</text>
  
  <!-- 2010 概念 -->
  <circle cx="180" cy="160" r="6" fill="#8b5cf6"/>
  <text x="180" y="140" text-anchor="middle" font-size="10" fill="#8b5cf6" font-weight="bold">2010</text>
  <text x="180" y="190" text-anchor="middle" font-size="9" fill="#475569">Cloud Native</text>
  <text x="180" y="202" text-anchor="middle" font-size="9" fill="#475569">概念诞生</text>
  
  <!-- 2013 Docker -->
  <circle cx="290" cy="160" r="9" fill="#0ea5e9"/>
  <text x="290" y="135" text-anchor="middle" font-size="11" fill="#0ea5e9" font-weight="bold">2013</text>
  <text x="290" y="190" text-anchor="middle" font-size="10" fill="#0ea5e9" font-weight="bold">Docker</text>
  <text x="290" y="204" text-anchor="middle" font-size="9" fill="#475569">容器民主化</text>
  
  <!-- 2014 K8s -->
  <circle cx="380" cy="160" r="9" fill="#3b82f6"/>
  <text x="380" y="135" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="bold">2014</text>
  <text x="380" y="190" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="bold">Kubernetes</text>
  <text x="380" y="204" text-anchor="middle" font-size="9" fill="#475569">编排标准</text>
  
  <!-- 2015 CNCF -->
  <circle cx="470" cy="160" r="8" fill="#10b981"/>
  <text x="470" y="135" text-anchor="middle" font-size="11" fill="#10b981" font-weight="bold">2015</text>
  <text x="470" y="190" text-anchor="middle" font-size="10" fill="#10b981" font-weight="bold">CNCF</text>
  <text x="470" y="204" text-anchor="middle" font-size="9" fill="#475569">生态治理</text>
  
  <!-- 2017 Istio -->
  <circle cx="560" cy="160" r="7" fill="#f59e0b"/>
  <text x="560" y="135" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="bold">2017</text>
  <text x="560" y="190" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="bold">Istio</text>
  <text x="560" y="204" text-anchor="middle" font-size="9" fill="#475569">服务网格</text>
  
  <!-- 2021 eBPF -->
  <circle cx="660" cy="160" r="7" fill="#ef4444"/>
  <text x="660" y="135" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">2021</text>
  <text x="660" y="190" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">eBPF</text>
  <text x="660" y="204" text-anchor="middle" font-size="9" fill="#475569">内核可编程</text>
  
  <!-- 2024 AI -->
  <circle cx="770" cy="160" r="8" fill="#ec4899"/>
  <text x="770" y="135" text-anchor="middle" font-size="11" fill="#ec4899" font-weight="bold">2024</text>
  <text x="770" y="190" text-anchor="middle" font-size="10" fill="#ec4899" font-weight="bold">AI+云原生</text>
  <text x="770" y="204" text-anchor="middle" font-size="9" fill="#475569">GPU 调度</text>
  
  <!-- 底部演进线 -->
  <text x="450" y="250" text-anchor="middle" font-size="11" fill="#64748b">物理机 → 虚拟机 → 容器 → 编排 → 服务网格 → Serverless → AI 基础设施</text>
  
  <!-- 阶段标注 -->
  <rect x="70" y="270" width="150" height="22" rx="4" fill="#e0e7ff"/>
  <text x="145" y="285" text-anchor="middle" font-size="9" fill="#4338ca">内部实践期</text>
  
  <rect x="255" y="270" width="180" height="22" rx="4" fill="#dbeafe"/>
  <text x="345" y="285" text-anchor="middle" font-size="9" fill="#1d4ed8">容器化 + 标准化</text>
  
  <rect x="460" y="270" width="160" height="22" rx="4" fill="#d1fae5"/>
  <text x="540" y="285" text-anchor="middle" font-size="9" fill="#065f46">生态爆发</text>
  
  <rect x="640" y="270" width="170" height="22" rx="4" fill="#fce7f3"/>
  <text x="725" y="285" text-anchor="middle" font-size="9" fill="#9d174d">深水区 + AI 融合</text>
</svg>
